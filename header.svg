<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 0 880 220" fill="none">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; }
        .title { fill: #e6edf3; }
        .subtitle { fill: #8b949e; }
        .accent { fill: #FA5C21; }
        .line { stroke: #21262d; }
        .tag { fill: #161b22; stroke: #30363d; }
        .tag-text { fill: #8b949e; }
        .dim { fill: #484f58; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .title { fill: #1f2328; }
        .subtitle { fill: #656d76; }
        .accent { fill: #FA5C21; }
        .line { stroke: #d0d7de; }
        .tag { fill: #f6f8fa; stroke: #d0d7de; }
        .tag-text { fill: #656d76; }
        .dim { fill: #afb8c1; }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes fadein {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideRight {
        from { width: 0; }
        to { width: 120px; }
      }

      .cursor {
        animation: blink 1.2s step-end infinite;
      }
      .pulse-dot {
        animation: pulse 2.4s ease-in-out infinite;
      }
      .fade-1 { animation: fadein 0.6s ease-out 0.2s both; }
      .fade-2 { animation: fadein 0.6s ease-out 0.5s both; }
      .fade-3 { animation: fadein 0.6s ease-out 0.8s both; }
      .fade-4 { animation: fadein 0.6s ease-out 1.1s both; }

      .mono {
        font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      }
      .sans {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }
    </style>
  </defs>

  <!-- Background (extended for viewBox) -->
  <rect class="bg" x="-40" width="880" height="220" rx="6"/>

  <g transform="translate(-40, 0)">
  <!-- Top accent line (from left edge) -->
  <rect class="accent" x="0" y="0" width="120" height="2.5" rx="1"/>

  <!-- Status indicator (slight right for breathing room) -->
  <circle class="accent pulse-dot" cx="16" cy="36" r="4"/>
  <text class="mono dim fade-1" x="28" y="40" font-size="11" letter-spacing="0.5">BUILDING</text>

  <!-- Main title -->
  <text class="sans title fade-2" x="12" y="92" font-size="42" font-weight="700" letter-spacing="-1">Jiayi (Seven) Du</text>
  <rect class="cursor accent" x="320" y="60" width="3" height="36" rx="1"/>

  <!-- Subtitle -->
  <text class="mono subtitle fade-3" x="12" y="128" font-size="13.5" letter-spacing="0.3">researcher  &amp;  builder  &amp;  trier</text>

  <!-- Bottom line decoration -->
  <text class="mono dim" x="0" y="208" font-size="10" letter-spacing="0.5">///  elsewhere</text>
  <g>
    <rect fill="#d0d4d9" x="795" y="200" width="60" height="16" rx="4" ry="4"/>
    <text class="mono" fill="#ffffff" x="801" y="212" font-size="10" letter-spacing="0.5">v2026.02</text>
  </g>
  </g>
</svg>